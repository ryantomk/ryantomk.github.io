<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Muhammed Rayan MK</title>

  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #b8a98a;
      --text: #111110;
      --soft-text: rgba(17,17,16,0.6);
      --accent: #8f7f63;
      --border: rgba(17,17,16,0.08);
      --card: rgba(255,255,255,0.25);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Montserrat', sans-serif;
    }

    nav {
      position: fixed;
      width: 100%;
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      background: transparent;
      z-index: 10;
    }

    nav.scrolled {
      background: rgba(255,255,255,0.4);
      backdrop-filter: blur(10px);
    }

    .nav-links { display: flex; gap: 20px; list-style: none; }
    .nav-links a {
      text-decoration: none;
      color: var(--soft-text);
      font-size: 12px;
      letter-spacing: 2px;
    }

    /* HERO */
    #home {
      height: 100vh;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      text-align: center;
      padding-bottom: 80px;
      position: relative;
    }

    .hero-image {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to bottom,
          rgba(184,169,138,0.05),
          rgba(184,169,138,0.3),
          rgba(184,169,138,0.7)
        ),
        url('rayanmk.png') center/cover no-repeat;
    }

    h1 {
      font-family: 'EB Garamond', serif;
      font-size: 90px;
    }

    /* SECTION */
    section {
      padding: 100px 40px;
      border-top: 1px solid var(--border);
    }

    .section-heading {
      font-family: 'EB Garamond', serif;
      font-size: 48px;
      margin-bottom: 40px;
    }

    /* ABOUT */
    #about {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
    }

    .about-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .about-text p {
      font-size: 18px;
      color: var(--soft-text);
      margin-bottom: 20px;
    }

    /* CONTACT */
    .contact-cards {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .contact-card {
      padding: 30px;
      border: 1px solid var(--border);
      background: var(--card);
      backdrop-filter: blur(10px);
      text-decoration: none;
      color: var(--text);
      transition: 0.3s;
    }

    .contact-card:hover {
      background: rgba(143,127,99,0.15);
      transform: translateY(-5px);
    }

    footer {
      padding: 30px;
      text-align: center;
      font-size: 12px;
      color: var(--soft-text);
    }

    @media(max-width:800px){
      #about { grid-template-columns: 1fr; }
      h1 { font-size: 50px; }
    }
  </style>
</head>

<body>

<nav id="nav">
  <div>Muhammed Rayan MK</div>
  <ul class="nav-links">
    <li><a href="#home">HOME</a></li>
    <li><a href="#about">ABOUT</a></li>
    <li><a href="#contact">CONTACT</a></li>
  </ul>
</nav>

<section id="home">
  <div class="hero-image"></div>
  <h1>Muhammed Rayan MK</h1>
</section>

<section id="about">
  <div class="about-img">
    <img src="rayanmk.png">
  </div>
  <div class="about-text">
    <h2 class="section-heading">About</h2>
    <p>I am a student passionate about technology, digital marketing, and creativity.</p>
    <p>I enjoy gaming, building skills, and exploring how brands grow online.</p>
  </div>
</section>

<section id="contact">
  <h2 class="section-heading">Contact</h2>

  <div class="contact-cards">
    <a href="https://instagram.com" class="contact-card">Instagram</a>
    <a href="#" class="contact-card">Email</a>
    <a href="#" class="contact-card">WhatsApp</a>
  </div>
</section>

<footer>
  © 2025 Muhammed Rayan MK
</footer>

<script>
const nav = document.getElementById('nav');
window.addEventListener('scroll', () => {
  nav.classList.toggle('scrolled', window.scrollY > 50);
});
</script>

</body>
</html>
